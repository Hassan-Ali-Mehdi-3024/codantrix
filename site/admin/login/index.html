<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in · Codantrix Labs admin</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://codantrix-labs.hassanalimehdi30.workers.dev" />
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
<style>
  :root {
    --paper: #f5f4ee;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #c2410c;
    --line: rgba(26, 26, 26, 0.12);
    --paper-2: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: grid;
    place-items: center;
  }
  .wrap {
    width: 100%;
    max-width: 420px;
    padding: 64px 24px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 28px;
    font-weight: 500;
  }
  h1 {
    font-size: 28px;
    line-height: 1.2;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .lede {
    font-size: 15px;
    line-height: 1.55;
    color: var(--muted);
    margin: 0 0 32px;
  }
  form { margin: 0; }
  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 8px;
    font-weight: 500;
  }
  input[type="email"] {
    width: 100%;
    padding: 13px 14px;
    background: var(--paper-2);
    border: 1px solid var(--line);
    border-radius: 2px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    transition: border-color 0.15s;
  }
  input[type="email"]:focus {
    outline: none;
    border-color: var(--ink);
  }
  button {
    margin-top: 20px;
    width: 100%;
    padding: 14px 18px;
    background: var(--ink);
    color: var(--paper);
    border: 0;
    border-radius: 2px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a2a; }
  button:disabled { background: #9a9a9a; cursor: not-allowed; }
  .msg {
    margin-top: 24px;
    padding: 14px 16px;
    background: var(--paper-2);
    border-left: 2px solid var(--accent);
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    border-radius: 2px;
  }
  .msg.error {
    border-left-color: #b91c1c;
  }
  .foot {
    margin-top: 48px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
    border-top: 1px solid var(--line);
    padding-top: 16px;
  }
  .foot a { color: var(--ink); text-decoration: none; }
  .foot a:hover { text-decoration: underline; }
  .hidden { display: none; }
</style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Codantrix Labs · Admin</p>
    <h1>Sign in</h1>
    <p class="lede">Enter your admin email. We'll send a one-time sign-in link.</p>

    <form id="login-form" autocomplete="on">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        autocomplete="email"
        spellcheck="false"
        autocapitalize="none"
        placeholder="you@codantrix.com"
      />
      <button id="submit" type="submit">Send sign-in link</button>
    </form>

    <div id="msg" class="msg hidden" role="status" aria-live="polite"></div>

    <p class="foot">
      Sign-in is restricted to allowlisted emails.
      <a href="/">Back to labs.codantrix.com</a>.
    </p>
  </main>

<script>
(function () {
  'use strict';
  var API_BASE = 'https://codantrix-labs.hassanalimehdi30.workers.dev';

  var form = document.getElementById('login-form');
  var emailEl = document.getElementById('email');
  var submitEl = document.getElementById('submit');
  var msgEl = document.getElementById('msg');

  function showMsg(text, kind) {
    msgEl.textContent = text;
    msgEl.classList.remove('hidden', 'error');
    if (kind === 'error') msgEl.classList.add('error');
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var email = (emailEl.value || '').trim().toLowerCase();
    if (!email) return;

    submitEl.disabled = true;
    submitEl.textContent = 'Sending…';

    fetch(API_BASE + '/api/auth/request', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
      .then(function (res) {
        return res.json().then(function (j) { return { status: res.status, body: j }; });
      })
      .then(function (r) {
        if (r.status === 200 && r.body && r.body.ok) {
          // Always show the same confirmation regardless of whether the email
          // was on the allowlist — the server doesn't tell us either way.
          showMsg(
            'If that email is on the admin list, a sign-in link is on its way. ' +
            'Check your inbox (and spam). The link expires in 15 minutes.',
            'ok'
          );
          form.reset();
          // Lock the form for 30s to discourage spamming.
          submitEl.textContent = 'Sent';
          setTimeout(function () {
            submitEl.disabled = false;
            submitEl.textContent = 'Send sign-in link';
          }, 30000);
          return;
        }
        if (r.status === 429) {
          showMsg('Too many requests. Wait a minute and try again.', 'error');
        } else if (r.body && r.body.error === 'email-format-invalid') {
          showMsg('That email address looks malformed.', 'error');
        } else if (r.body && r.body.error === 'email-unavailable') {
          showMsg('Email service is temporarily unavailable. Try again shortly.', 'error');
        } else {
          showMsg('Something went wrong. Try again.', 'error');
        }
        submitEl.disabled = false;
        submitEl.textContent = 'Send sign-in link';
      })
      .catch(function () {
        showMsg('Network error. Check your connection and try again.', 'error');
        submitEl.disabled = false;
        submitEl.textContent = 'Send sign-in link';
      });
  });
})();
</script>
</body>
</html>
